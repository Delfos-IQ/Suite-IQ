<!DOCTYPE html>
<!-- SOPHIA·IQ · v1.0 · Academia de Inversión e Inteligencia Financiera -->
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SOPHIA·IQ · Academia de Inversión</title>
<meta name="description" content="Academia de inversión y finanzas personales. Aprende análisis fundamental, valoración y estrategia de cartera desde cero hasta avanzado."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@300;400;500;700&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
/* ══════════════════════════════════════════════════════════
   SOPHIA·IQ — Design System
   ══════════════════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}

:root {
  --a1:#f59e0b; --a2:#fbbf24; --a3:#22c55e; --a4:#3b82f6; --a5:#a78bfa;
  --red:#ef4444; --green:#22c55e; --yellow:#f59e0b;
  --r:6px; --r-sm:4px; --r-lg:10px; --r-xl:14px;
  --trans:150ms cubic-bezier(.4,0,.2,1);
  --shadow-sm:0 1px 3px rgba(0,0,0,.08);
  --shadow-md:0 4px 16px rgba(0,0,0,.16);
}

/* ── Dark (default) ── */
:root,[data-theme="dark"] {
  --bg:#070a0e; --bg2:#0d1117; --bg3:#111820; --bg4:#161f2b;
  --border:#1e2d3d; --border2:#253445;
  --tx:#e2e8f0; --tx2:#94a3b8; --tx3:#475569; --tx4:#2d3f52;
  --glow:0 0 24px rgba(245,158,11,.12);
  --grid:rgba(245,158,11,.02);
  --card-bg:var(--bg2); --card-border:var(--border);
}

/* ── Light ── */
[data-theme="light"] {
  --bg:#fdfaf5; --bg2:#ffffff; --bg3:#fef9ef; --bg4:#fdf3d7;
  --border:#e5d9b6; --border2:#d4c490;
  --tx:#1c1410; --tx2:#4a3728; --tx3:#7a6040; --tx4:#a89060;
  --glow:0 0 24px rgba(245,158,11,.08);
  --grid:rgba(245,158,11,.04);
  --card-bg:var(--bg2); --card-border:var(--border);
  --a1:#d97706; --a2:#b45309; --a3:#15803d; --a4:#1d4ed8;
}

/* ── Layout ── */
body{background:var(--bg);color:var(--tx);font-family:'IBM Plex Sans',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}
.app{min-height:100vh;position:relative;overflow-x:hidden}

.grid-bg{position:fixed;inset:0;background-image:
  linear-gradient(var(--grid) 1px,transparent 1px),
  linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0}

.wrap{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:28px 24px}

/* ── Header ── */
.hdr{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:32px;flex-wrap:wrap}
.sophia-logo-wrap{display:flex;align-items:center;gap:12px;text-decoration:none}

.sophia-logo-icon{
  width:52px;height:52px;border-radius:12px;
  background:rgba(245,158,11,.08);
  border:1px solid rgba(245,158,11,.2);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 20px rgba(245,158,11,.15);
  flex-shrink:0;overflow:hidden;
}

.sophia-logo-text{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-.5px;line-height:1;
  background:linear-gradient(135deg,#f59e0b 0%,#fbbf24 50%,#f97316 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sophia-logo-sub{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--tx3);letter-spacing:.15em;text-transform:uppercase;margin-top:3px}

.hdr-r{display:flex;align-items:center;gap:10px;flex-wrap:wrap}

/* ── Lang switcher ── */
.lang-sw{display:flex;gap:3px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:3px}
.lang-btn{background:transparent;border:none;border-radius:4px;padding:4px 10px;
  font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;
  color:var(--tx3);cursor:pointer;transition:var(--trans);display:flex;align-items:center;gap:5px}
.lang-btn.active,.lang-btn:hover{background:var(--bg2);color:var(--a1);box-shadow:var(--shadow-sm)}

/* ── Theme toggle ── */
.theme-toggle{width:34px;height:34px;border-radius:var(--r);background:var(--bg3);border:1px solid var(--border);
  cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;
  transition:var(--trans);color:var(--tx2)}
.theme-toggle:hover{border-color:var(--a1);color:var(--a1);background:rgba(245,158,11,.08)}

/* ── Pill buttons ── */
.hdr-pill{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:100px;
  border:1px solid var(--border);background:var(--bg3);color:var(--tx2);
  font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;
  cursor:pointer;text-decoration:none;transition:var(--trans);white-space:nowrap}
.hdr-pill:hover{border-color:var(--a1);color:var(--a1);background:rgba(245,158,11,.08)}
.hdr-pill.back{border-color:rgba(245,158,11,.3);color:var(--a1)}

/* ── Nav tabs ── */
.nav-tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:28px;flex-wrap:wrap}
.nav-tab{background:transparent;border:none;border-bottom:2px solid transparent;
  padding:10px 18px 9px;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;
  letter-spacing:.04em;color:var(--tx3);cursor:pointer;transition:var(--trans);
  display:flex;align-items:center;gap:7px;white-space:nowrap;margin-bottom:-1px}
.nav-tab:hover{color:var(--tx2)}
.nav-tab.active{color:var(--a1);border-bottom-color:var(--a1)}

/* ── Search bar ── */
.sp-search-wrap{position:relative;margin-bottom:28px}
.sp-search{width:100%;padding:12px 16px 12px 44px;background:var(--bg2);
  border:1px solid var(--border);border-radius:var(--r-lg);
  font-family:'IBM Plex Sans',sans-serif;font-size:15px;color:var(--tx);
  transition:var(--trans)}
.sp-search:focus{outline:none;border-color:var(--a1);box-shadow:0 0 0 3px rgba(245,158,11,.1)}
.sp-search::placeholder{color:var(--tx4)}
.sp-search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);
  font-size:16px;color:var(--tx3);pointer-events:none}
.sp-search-clear{position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--tx3);cursor:pointer;font-size:16px;
  display:none}

/* ── Filter pills ── */
.sp-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.sp-filter{padding:5px 14px;border-radius:100px;border:1px solid var(--border);
  background:var(--bg2);color:var(--tx3);font-family:'IBM Plex Mono',monospace;
  font-size:11px;font-weight:600;cursor:pointer;transition:var(--trans)}
.sp-filter:hover{border-color:var(--a1);color:var(--a1)}
.sp-filter.active{border-color:var(--a1);background:rgba(245,158,11,.1);color:var(--a1)}
.sp-filter-sep{width:1px;background:var(--border);margin:0 4px;align-self:stretch}

/* ── Stats strip ── */
.sp-stats{display:flex;gap:28px;padding:16px 20px;background:var(--bg2);
  border:1px solid var(--border);border-radius:var(--r-xl);margin-bottom:28px;flex-wrap:wrap}
.sp-stat{display:flex;flex-direction:column;gap:2px}
.sp-stat-num{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--a1)}
.sp-stat-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--tx3);letter-spacing:.1em;text-transform:uppercase}

/* ── Article cards (concept grid) ── */
.sp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.sp-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--r-xl);
  padding:18px;cursor:pointer;transition:var(--trans);position:relative;overflow:hidden}
.sp-card::before{content:'';position:absolute;inset:0;opacity:0;
  background:radial-gradient(circle at top left,rgba(245,158,11,.04),transparent 60%);
  transition:var(--trans)}
.sp-card:hover{border-color:rgba(245,158,11,.3);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.sp-card:hover::before{opacity:1}
.sp-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.sp-card-icon{font-size:22px}
.sp-card-level{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;
  padding:3px 8px;border-radius:100px;letter-spacing:.08em}
.level-start{background:rgba(34,197,94,.1);color:#22c55e;border:1px solid rgba(34,197,94,.2)}
.level-mid  {background:rgba(245,158,11,.1);color:#f59e0b;border:1px solid rgba(245,158,11,.2)}
.level-adv  {background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2)}
.sp-card-title{font-size:15px;font-weight:700;color:var(--tx);margin-bottom:6px;line-height:1.35}
.sp-card-cat{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--tx3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.sp-card-desc{font-size:13px;color:var(--tx3);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.sp-card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
.sp-card-read{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--a1)}
.sp-card-arr{color:var(--tx4);font-size:12px;transition:var(--trans)}
.sp-card:hover .sp-card-arr{transform:translateX(4px);color:var(--a1)}

/* ── Course cards ── */
.sp-courses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.sp-course-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--r-xl);
  overflow:hidden;cursor:pointer;transition:var(--trans)}
.sp-course-card:hover{border-color:rgba(245,158,11,.4);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.sp-course-hero{height:140px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.sp-course-icon{font-size:52px;filter:drop-shadow(0 4px 16px rgba(0,0,0,.3))}
.sp-course-body{padding:16px}
.sp-course-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--tx);margin-bottom:6px;line-height:1.3}
.sp-course-desc{font-size:13px;color:var(--tx3);line-height:1.6;margin-bottom:12px}
.sp-course-meta{display:flex;align-items:center;justify-content:space-between}
.sp-course-lessons{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--tx3)}
.sp-course-progress{display:flex;align-items:center;gap:8px}
.sp-prog-bar{width:60px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.sp-prog-fill{height:100%;background:var(--a1);border-radius:2px;transition:width .5s ease}
.sp-prog-pct{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--a1)}
.sp-course-locked{opacity:.55}

/* ── Article modal ── */
.sp-modal-overlay{position:fixed;inset:0;background:var(--overlay-bg,rgba(0,0,0,.7));
  z-index:100;display:flex;align-items:flex-start;justify-content:center;
  overflow-y:auto;padding:40px 20px;opacity:0;pointer-events:none;transition:opacity .2s}
.sp-modal-overlay.open{opacity:1;pointer-events:all}
.sp-modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-xl);
  max-width:760px;width:100%;padding:32px;position:relative;margin:auto}
.sp-modal-close{position:absolute;top:16px;right:16px;background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--r);width:32px;height:32px;cursor:pointer;color:var(--tx3);
  font-size:16px;display:flex;align-items:center;justify-content:center;transition:var(--trans)}
.sp-modal-close:hover{border-color:var(--red);color:var(--red)}
.sp-modal-cat{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--a1);
  letter-spacing:.15em;text-transform:uppercase;margin-bottom:10px}
.sp-modal-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--tx);
  margin-bottom:20px;line-height:1.3}
.sp-modal-body{font-size:15px;color:var(--tx2);line-height:1.8}
.sp-modal-body h4{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--tx);margin:20px 0 8px}
.sp-modal-body p{margin-bottom:14px}
.sp-modal-body ul,.sp-modal-body ol{margin:0 0 14px 20px}
.sp-modal-body li{margin-bottom:6px}
.sp-modal-body strong{color:var(--tx);font-weight:600}
.sp-modal-body .sp-source{display:inline-flex;align-items:center;gap:6px;margin-top:16px;
  padding:6px 14px;border-radius:var(--r);border:1px solid var(--border);
  font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--tx3);text-decoration:none;transition:var(--trans)}
.sp-modal-body .sp-source:hover{border-color:var(--a1);color:var(--a1)}

/* ── Read progress ── */
.sp-read-prog-wrap{height:3px;background:var(--border);position:fixed;top:0;left:0;right:0;z-index:200}
.sp-read-prog-fill{height:100%;background:linear-gradient(90deg,var(--a1),var(--a3));width:0%;transition:width .1s}

/* ── About page ── */
.sp-about{max-width:760px;margin:0 auto}
.sp-about-hero{text-align:center;padding:40px 0 32px;border-bottom:1px solid var(--border);margin-bottom:28px}
.sp-about-logo-big{font-size:64px;margin-bottom:16px}
.sp-about-tagline{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--tx3);letter-spacing:.15em;text-transform:uppercase;margin-bottom:14px}
.sp-about-desc{font-size:15px;color:var(--tx3);max-width:500px;margin:0 auto;line-height:1.7}
.sp-about-section{margin-bottom:32px}
.sp-about-section-title{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--a1);
  letter-spacing:.2em;text-transform:uppercase;margin-bottom:14px}
.sp-feature-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.sp-feature-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px}
.sp-feature-icon{font-size:20px;margin-bottom:8px}
.sp-feature-name{font-size:13px;font-weight:700;color:var(--tx);margin-bottom:4px}
.sp-feature-desc{font-size:11px;color:var(--tx3);line-height:1.55}
.sp-axios-promo{background:var(--bg2);border:1px solid rgba(0,212,170,.2);border-radius:var(--r-xl);
  padding:18px;display:flex;gap:14px;align-items:flex-start}
.sp-changelog-item{border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:6px}
.sp-cl-hdr{display:flex;align-items:center;gap:14px;padding:12px 16px;cursor:pointer;
  background:var(--bg2);transition:var(--trans)}
.sp-cl-hdr:hover{background:var(--bg3)}
.sp-cl-body{display:none;padding:12px 16px 12px 80px;border-top:1px solid var(--border);
  font-size:12px;color:var(--tx3);line-height:1.8}

/* ── Course viewer overlay ── */
.sp-cv-overlay{position:fixed;inset:0;background:var(--bg);z-index:150;overflow-y:auto;display:none}
.sp-cv-overlay.open{display:block}
.sp-cv-wrap{max-width:900px;margin:0 auto;padding:32px 24px}
.sp-cv-header{display:flex;align-items:center;gap:16px;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.sp-cv-back{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  padding:7px 16px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--tx3);
  cursor:pointer;transition:var(--trans)}
.sp-cv-back:hover{border-color:var(--a1);color:var(--a1)}
.sp-cv-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--tx)}
.sp-cv-prog{flex:1;max-width:200px}
.sp-cv-prog-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.sp-cv-prog-fill{height:100%;background:var(--a1);border-radius:2px;transition:width .4s}
.sp-cv-lessons{display:flex;flex-direction:column;gap:8px}
.sp-lesson-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);
  padding:14px 18px;cursor:pointer;transition:var(--trans);display:flex;align-items:center;gap:14px}
.sp-lesson-item:hover{border-color:rgba(245,158,11,.3);background:var(--bg3)}
.sp-lesson-item.done{border-color:rgba(34,197,94,.2);background:rgba(34,197,94,.03)}
.sp-lesson-num{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--tx3);min-width:24px}
.sp-lesson-title{font-size:14px;font-weight:600;color:var(--tx);flex:1}
.sp-lesson-done{font-size:14px;color:var(--green)}

/* ── Lesson reader ── */
.sp-lr-overlay{position:fixed;inset:0;background:var(--bg);z-index:200;overflow-y:auto;display:none}
.sp-lr-overlay.open{display:block}
.sp-lr-wrap{max-width:720px;margin:0 auto;padding:40px 24px}
.sp-lr-header{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.sp-lr-back{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  padding:7px 16px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--tx3);
  cursor:pointer;transition:var(--trans)}
.sp-lr-back:hover{border-color:var(--a1);color:var(--a1)}
.sp-lr-content{font-size:16px;color:var(--tx2);line-height:1.85}
.sp-lr-content h3{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--tx);margin:28px 0 12px}
.sp-lr-content h4{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--tx);margin:20px 0 8px}
.sp-lr-content p{margin-bottom:16px}
.sp-lr-content ul,.sp-lr-content ol{margin:0 0 16px 24px}
.sp-lr-content li{margin-bottom:8px}
.sp-lr-content strong{color:var(--a1)}
.sp-lr-content blockquote{border-left:3px solid var(--a1);padding:12px 20px;margin:20px 0;
  background:rgba(245,158,11,.05);border-radius:0 var(--r) var(--r) 0;
  font-style:italic;color:var(--tx3)}
.sp-lr-footer{display:flex;justify-content:space-between;align-items:center;
  margin-top:40px;padding-top:24px;border-top:1px solid var(--border)}
.sp-lr-mark-done{padding:10px 24px;background:linear-gradient(135deg,var(--a1),var(--a3));
  border:none;border-radius:var(--r-lg);color:#000;font-family:'IBM Plex Mono',monospace;
  font-size:12px;font-weight:700;cursor:pointer;transition:var(--trans)}
.sp-lr-mark-done:hover{opacity:.9;transform:translateY(-1px)}

/* ── Certificate ── */
.sp-cert-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;
  display:none;align-items:center;justify-content:center}
.sp-cert-overlay.open{display:flex}
.sp-cert-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-xl);
  padding:32px;text-align:center;max-width:520px;width:90%}
canvas#sp-cert-canvas{width:100%;max-width:480px;height:auto;border-radius:var(--r-lg);margin-top:16px}
.sp-cert-btns{display:flex;gap:10px;justify-content:center;margin-top:16px}

/* ── Empty state ── */
.sp-empty{text-align:center;padding:60px 24px;color:var(--tx3)}
.sp-empty-icon{font-size:48px;margin-bottom:16px}
.sp-empty-title{font-size:17px;font-weight:700;color:var(--tx);margin-bottom:8px}
.sp-empty-desc{font-size:13px;line-height:1.7;max-width:340px;margin:0 auto}

/* ── Error toast ── */
.sp-toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--red);
  border-radius:var(--r-lg);padding:12px 18px;font-family:'IBM Plex Mono',monospace;
  font-size:12px;color:var(--tx);z-index:500;opacity:0;transform:translateY(10px);
  transition:var(--trans);pointer-events:none}
.sp-toast.visible{opacity:1;transform:none}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── Mobile ── */
@media(max-width:600px){
  .wrap{padding:18px 14px}
  .sp-grid{grid-template-columns:1fr}
  .sp-courses-grid{grid-template-columns:1fr}
  .hdr{gap:10px}
  .sp-stats{gap:16px}
}


/* ══ Imported from AXIOS-IQ: Academy + Course engine CSS ══ */
/* 7. ACADEMIA CARDS — complete redesign */
.acad-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 20px;
  cursor: pointer;
  transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
  display: flex;
  flex-direction: column;
  gap: 10px;

.academy-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-top:20px}

<script>
// ── State variables for article + course engine ──────────────
// acadMode, acadLevel, acadCat used by article engine
var acadMode  = 'concepts';
var acadLevel = 'all';
var acadCat   = 'all';
// Provide state.sector fallback (used by renderItems28)
if (typeof state === 'undefined') var state = { sector: 'technology', ticker: '', name: '' };
// Provide SECTORS fallback
if (typeof SECTORS === 'undefined') var SECTORS = { technology: { label: 'Tecnología' } };
// Provide ITEMS fallback (used by renderItems28) 
if (typeof ITEMS === 'undefined') var ITEMS = [];

// ── tr() wrapper for SOPHIA-IQ ───────────────────────────────
// Article engine calls tr() — bridge to spt()
function tr(key) {
  // Map AXIOS-IQ STRINGS keys to SOPHIA-IQ SP_STRINGS keys
  var keyMap = {
    tabConcepts:'tabArticles', tab28:'tabArticles',
    filterAll:'filterAll', filterBegin:'filterBeg', filterMid:'filterMid', filterAdv:'filterAdv',
    filterFund:'filterFund', filterTech:'filterTech', filterMacro:'filterMacro', filterQual:'filterQual',
    levelNivel:'levelBeg', temaTema:'filterAll', catLabel:'filterAll',
    emptyAcad:'searchPlaceholder',
  };
  var mapped = keyMap[key];
  if (mapped) return spt(mapped);
  return spt(key) !== key ? spt(key) : key;
}

// ── showTab adapter: article engine may call showTab('academy') ──
var _origShowTab = typeof showTab === 'function' ? showTab : null;
if (typeof showTab === 'undefined') {
  function showTab(tab) {
    var map = { academy: 'courses', courses: 'courses', articles: 'articles', about: 'about' };
    var target = map[tab] || tab;
    // Delegate to SOPHIA-IQ's showTab via the real function reference
    if (_origShowTab) _origShowTab(target);
  }
}

// ── _setHash / _updateBreadcrumb stubs (SOPHIA-IQ has no hash routing) ──
function _setHash(){}
function _updateBreadcrumb(){}

// ── _showToast bridge ──
function _showToast(msg, dur) { spShowToast(msg, dur); }

// ── openAcadModal: article engine uses this — make it work ───
// Already defined in the article engine below, but alias closeAcadModal
function closeAcadModal() {
  var el = document.getElementById('acad-modal');
  if (el) el.classList.remove('open');
}


// ══ Article engine (from AXIOS-IQ academy.js) ══
// AXIOS·IQ — academy.js — Articles + Courses + Certificates

// ══════════════════════════════════════════════════════════════
// ACADEMIA — two modes: concepts (with levels) + 28 items
// ══════════════════════════════════════════════════════════════
function renderAcademy_axiossq(){ // legacy stub
  renderAcademy(); }
function renderAcademy_orig(){
  if(!ACADEMIA_FULL){ _loadAcademia(); return; }
  if(!COURSES){
    _loadCourses(function(){
      if(_currentCourseId){ _openCourse(_currentCourseId); }
      else { renderAcademyCourses(); }
    });
    return;
  }
  if(_currentCourseId){ _openCourse(_currentCourseId); }
  else { renderAcademyCourses(); }
}

function _loadAcademia(){
  const el = document.getElementById('academy-content');
  el.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:200px;gap:14px;color:var(--tx3);font-family:monospace;font-size:13px">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1s linear infinite">
      <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
    </svg>
    Cargando Academia...</div>`;
  fetch('academia.json')
    .then(r => { if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(data => {
      ACADEMIA_FULL = data;
      _loadCourses(function(){
        if(_currentCourseId){_openCourse(_currentCourseId);}else{renderAcademyCourses();}
      });
    })
    .catch(err => {
      el.innerHTML = `<div style="padding:32px;color:var(--red);font-family:sans-serif;font-size:13px">
        ⚠️ Error al cargar la Academia: ${err.message}<br>
        <small style="color:var(--tx3)">Asegúrate de que academia.json está en la misma carpeta que el HTML.</small></div>`;
    });
}

function _renderAcademiaUI(){
  const el=document.getElementById('academy-content');
  const modeTabs=`<div style="display:flex;gap:0;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:24px;width:fit-content">
    <button class="acad-filter-btn${acadMode==='concepts'?' active':''}" style="border-right:1px solid var(--border);border-radius:0" onclick="setAcadMode('concepts')">${tr('tabConcepts')}</button>
    <button class="acad-filter-btn${acadMode==='items'?' active':''}" style="border-radius:0" onclick="setAcadMode('items')">${tr('tab28')}</button>
  </div>`;
  if(acadMode==='items'){ el.innerHTML=modeTabs+renderItems28(); return; }

  const levels=[['all',tr('filterAll')],['beginner',tr('filterBegin')],['intermediate',tr('filterMid')],['advanced',tr('filterAdv')]];
  const cats  =[['all',tr('filterAll')],['fundamental',tr('filterFund')],['technical',tr('filterTech')],['macro',tr('filterMacro')],['quality',tr('filterQual')]];
  const lvlColor={beginner:'var(--a1)',intermediate:'var(--a2)',advanced:'var(--a4)'};
  const lvlLabel={beginner:tr('filterBegin'),intermediate:tr('filterMid'),advanced:tr('filterAdv')};

  let lvlRow=`<div class="acad-filter" style="margin-bottom:8px"><span style="font-size:9px;color:var(--tx3);letter-spacing:2px;text-transform:uppercase;margin-right:6px;align-self:center">${tr('levelNivel')}</span>`;
  levels.forEach(([k,v])=>{ lvlRow+=`<button class="acad-filter-btn${acadLevel===k?' active':''}" onclick="setAcadLevel('${k}')">${v}</button>`; });
  lvlRow+='</div>';

  let catRow=`<div class="acad-filter" style="margin-bottom:22px"><span style="font-size:9px;color:var(--tx3);letter-spacing:2px;text-transform:uppercase;margin-right:6px;align-self:center">${tr('temaTema')}</span>`;
  cats.forEach(([k,v])=>{ catRow+=`<button class="acad-filter-btn${acadCat===k?' active':''}" onclick="setAcadCat('${k}')">${v}</button>`; });
  catRow+='</div>';

  const filtered=ACADEMIA_FULL.filter(a=>(acadLevel==='all'||a.level===acadLevel)&&(acadCat==='all'||a.cat===acadCat));
  let grid='<div class="academy-grid">';
  filtered.forEach(a=>{
    const bc=lvlColor[a.level]||'var(--tx3)';
    const bl=lvlLabel[a.level]||'';
    const preview=a.body.replace(/<[^>]+>/g,'').substring(0,120);
    grid+=`<div class="acad-card" id="acad-${a.id}" onclick="openAcadCard('${a.id}')">
      <div class="acad-icon">${a.icon}</div>
      <div class="acad-title">${spLang==='en'&&a.title_en?a.title_en:spLang==='pt'&&a.title_pt?a.title_pt:a.title}</div>
      <div class="acad-desc">${preview}...</div>
      <div class="acad-tags">
        <span class="acad-tag level-${a.level}">${bl}</span>
        <span class="acad-tag">${a.cat}</span>
      </div>
    </div>`;
  });

// Open academia article as modal overlay — NEVER changes the active tab
function openAcadModal(id, fallbackCat){
  if(!ACADEMIA_FULL){ showTab('academy'); return; }
  let a = id ? ACADEMIA_FULL.find(x=>x.id===id) : null;
  if(!a && fallbackCat) a = ACADEMIA_FULL.find(x=>x.cat===fallbackCat);
  if(!a) a = ACADEMIA_FULL[0];
  const lvlLabel={beginner:tr('filterBegin'),intermediate:tr('filterMid'),advanced:tr('filterAdv')};

  // Pick title + body in current language
  const title = (spLang==='en'&&a.title_en) ? a.title_en : (spLang==='pt'&&a.title_pt) ? a.title_pt : a.title;
  const body  = (spLang==='en'&&a.body_en)  ? a.body_en  : (spLang==='pt'&&a.body_pt)  ? a.body_pt  : a.body;

  document.getElementById('acad-modal-title').textContent = title;
  document.getElementById('acad-modal-cat').textContent   = (lvlLabel[a.level]||a.level)+' · '+a.cat;

  // Estimate reading time (avg 200 words/min)
  const wordCount = body.replace(/<[^>]+>/g,'').trim().split(/\s+/).length;
  const readMins  = Math.max(1, Math.ceil(wordCount/200));
  var readLabel = { es: readMins+'min de lectura', en: readMins+'min read', pt: readMins+'min de leitura' };

  // Build modal body with progress bar + related articles
  const progressHTML = '<div class="read-progress-wrap" id="read-progress-wrap">'
    + '<span class="read-time-badge">⏱ '+(readLabel[spLang]||readLabel.es)+'</span>'
    + '<div class="read-progress-bar-track"><div class="read-progress-bar-fill" id="read-prog-fill"></div></div>'
    + '<span class="read-progress-pct" id="read-prog-pct">0%</span>'
    + '</div>';

  // Related articles (same category, different id, max 3)
  const related = ACADEMIA_FULL.filter(function(x){ return x.cat===a.cat && x.id!==a.id; }).slice(0,3);
  let relatedHTML = '';
  if(related.length){
    const relHdr = {es:'Artículos relacionados', en:'Related articles', pt:'Artigos relacionados'};
    relatedHTML = '<div class="related-section"><div class="related-hdr">📚 '+(relHdr[spLang]||relHdr.es)+'</div><div class="related-grid">';
    related.forEach(function(r){
      const rTitle = (spLang==='en'&&r.title_en)?r.title_en:(spLang==='pt'&&r.title_pt)?r.title_pt:r.title;
      relatedHTML += '<div class="related-card" onclick="openAcadModal(&apos;'+r.id+'&apos;)"><div class="related-card-icon">'+(r.icon||'📄')+'</div>'
        + '<div class="related-card-title">'+rTitle+'</div>'
        + '<div class="related-card-meta">'+(lvlLabel[r.level]||r.level)+'</div>'
        + '</div>';
    });
    relatedHTML += '</div></div>';
  }

  document.getElementById('acad-modal-body').innerHTML = progressHTML + body + relatedHTML;
  document.getElementById('acad-modal').classList.add('open');

  // Attach scroll handler for progress
  setTimeout(function(){
    const modalEl = document.getElementById('acad-modal');
    const bodyEl  = document.getElementById('acad-modal-body');
    if(!modalEl||!bodyEl) return;
    function _onScroll(){
      const fill = document.getElementById('read-prog-fill');
      const pct  = document.getElementById('read-prog-pct');
      if(!fill||!pct) return;
      const scrollTop    = bodyEl.scrollTop;
      const scrollHeight = bodyEl.scrollHeight - bodyEl.clientHeight;
      const progress     = scrollHeight > 0 ? Math.min(100, Math.round((scrollTop/scrollHeight)*100)) : 100;
      fill.style.width = progress+'%';
      pct.textContent  = progress+'%';
    }
    bodyEl.removeEventListener('scroll', bodyEl._progHandler||function(){});
    bodyEl._progHandler = _onScroll;
    bodyEl.addEventListener('scroll', _onScroll);
    bodyEl.scrollTop = 0;
    _onScroll();
  }, 80);
}
function closeAcadModal(){ document.getElementById('acad-modal').classList.remove('open'); }

// ── Load courses.json ─────────────────────────────────────────
function _loadCourses(callback) {
  if (COURSES) { if(callback) callback(); return; }
  fetch('courses.json')
    .then(r => r.json())
    .then(data => {
      COURSES = data;
      if (callback) callback();
    })
    .catch(err => {
      console.warn('[AXIOS-IQ] Could not load courses.json:', err);
      COURSES = [];
      if (callback) callback();
    });
}

// ── Course progress stored in localStorage ─────────────────────
function _getCourseProgress() {
  try { return JSON.parse(localStorage.getItem('axq_courses') || '{}'); }
  catch(e) { return {}; }
}
function _saveCourseProgress(p) {
  try { localStorage.setItem('axq_courses', JSON.stringify(p)); } catch(e) {}
}
function _isLessonDone(courseId, lessonId) {
  const p = _getCourseProgress();
  return !!(p[courseId] && p[courseId][lessonId]);
}
function _markLessonDone(courseId, lessonId) {
  const p = _getCourseProgress();
  if (!p[courseId]) p[courseId] = {};
  p[courseId][lessonId] = Date.now();
  _saveCourseProgress(p);
}
function _getCourseStats(courseId) {
  const course = COURSES.find(c => c.id === courseId);
  if (!course) return { total: 0, done: 0, pct: 0 };
  const p = _getCourseProgress()[courseId] || {};
  let total = 0, done = 0;
  course.modules.forEach(m => m.lessons.forEach(l => {
    total++;
    if (p[l.id]) done++;
  }));
  return { total, done, pct: total > 0 ? Math.round((done / total) * 100) : 0 };
}
function _isCourseComplete(courseId) {
  const s = _getCourseStats(courseId);
  return s.total > 0 && s.done >= s.total;
}
function _isCourseUnlocked(course) {
  if (!course.requires) return true;
  return _isCourseComplete(course.requires);
}

    if (fill) fill.style.width = stats.pct + '%';
    const progSpans = document.querySelectorAll('.course-overall-progress span');
    if (progSpans.length >= 3) {
      progSpans[0].textContent = stats.done + '/' + stats.total + ' ' + ({es:'progreso',en:'progress',pt:'progresso'}[lang]||'progreso');
      progSpans[2].textContent = stats.pct + '%';
    }
    // Show cert section if complete
    if (_isCourseComplete(courseId)) {
      const certSec = document.getElementById('cert-section');
      if (certSec) certSec.classList.add('visible');
    }
    // Refresh module progress counter
    document.querySelectorAll('.course-module').forEach(modEl => {
      const rows = modEl.querySelectorAll('.lesson-row');
      const doneCount = modEl.querySelectorAll('.lesson-row.done').length;
      const progEl = modEl.querySelector('.course-module-progress');
      if (progEl) progEl.textContent = doneCount + '/' + rows.length;
    });
  }, 300);
}

// ── Certificate generation ────────────────────────────────────
function _generateCertificate(courseId) {
  const course   = COURSES.find(c => c.id === courseId);
  if (!course) return;

  const canvas   = document.getElementById('cert-canvas');
  const overlay  = document.getElementById('cert-overlay');
  if (!canvas || !overlay) return;

  const ctx      = canvas.getContext('2d');
  const W = 680, H = 480;
  canvas.width = W; canvas.height = H;

  const titleStr = course.title[lang] || course.title.es;
  const today    = new Date().toLocaleDateString(lang==='pt'?'pt-PT':lang==='en'?'en-US':'es-ES', { year:'numeric', month:'long', day:'numeric' });

  // Background
  ctx.fillStyle = '#070a0e';
  ctx.fillRect(0, 0, W, H);

  // Border gradient
  const borderGrad = ctx.createLinearGradient(0,0,W,H);
  borderGrad.addColorStop(0, '#00d4aa');
  borderGrad.addColorStop(0.5, '#3b82f6');
  borderGrad.addColorStop(1, '#a78bfa');
  ctx.strokeStyle = borderGrad;
  ctx.lineWidth = 3;
  ctx.strokeRect(12, 12, W-24, H-24);

  // Inner border
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  ctx.strokeRect(20, 20, W-40, H-40);

  // AXIOS-IQ logo text
  ctx.font = 'bold 22px "IBM Plex Mono", monospace';
  ctx.fillStyle = '#00d4aa';
  ctx.textAlign = 'center';
  ctx.fillText('AXIOS·IQ', W/2, 70);

  ctx.font = '11px "IBM Plex Mono", monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillText('CERTIFICADO DE FINALIZACIÓN · CERTIFICATE OF COMPLETION', W/2, 92);

  // Divider
  ctx.strokeStyle = 'rgba(0,212,170,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(60, 108); ctx.lineTo(W-60, 108); ctx.stroke();

  // Course emoji
  ctx.font = '56px serif';
  ctx.textAlign = 'center';
  ctx.fillText(course.emoji, W/2, 185);

  // Course title
  ctx.font = 'bold 28px "IBM Plex Sans", sans-serif';
  ctx.fillStyle = '#e2e8f0';
  ctx.textAlign = 'center';
  ctx.fillText(titleStr, W/2, 240);

  // Level badge
  ctx.font = '13px "IBM Plex Sans", sans-serif';
  ctx.fillStyle = '#00d4aa';
  const badgeTxt = course.badgeLabel[lang] || course.badgeLabel.es;
  ctx.fillText('— ' + badgeTxt + ' —', W/2, 268);

  // Divider
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(80, 290); ctx.lineTo(W-80, 290); ctx.stroke();

  // Completion text
  const completionText = {
    es: 'Ha completado satisfactoriamente todos los módulos del curso',
    en: 'Has successfully completed all modules of this course',
    pt: 'Completou com sucesso todos os módulos deste curso',
  }[lang] || 'Ha completado satisfactoriamente todos los módulos';

  ctx.font = '14px "IBM Plex Sans", sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fillText(completionText, W/2, 330);

  // Date
  ctx.font = '12px "IBM Plex Mono", monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fillText(today, W/2, 360);

  // Bottom seal
  ctx.font = '11px "IBM Plex Mono", monospace';
  ctx.fillStyle = 'rgba(0,212,170,0.5)';
  ctx.fillText('AXIOS·IQ · axiosiq.com · ' + today, W/2, 440);

  overlay.classList.add('open');
}

// Fills: rates, inflation, currency items
// ══════════════════════════════════════════════════════════════

let _macroCache = null;  // cache for the session

async function _macroFetch() {
  if (!WORKER_URL) return;

  // Use cache if available (macro data valid for the whole session)
  if (_macroCache) { _macroApply(_macroCache); return; }

  try {
    const res  = await fetch(WORKER_URL + '/macro');
    const json = await res.json();
    if (!json.ok || !json.data) return;
    _macroCache = json.data;
    _macroApply(_macroCache);
  } catch(e) {
    console.warn('[AXIOS-IQ] Macro fetch failed:', e.message);
  }
}

function _macroApply(macro) {
  if (!macro || !state.ticker) return;

  const ff   = macro.fedFunds;   // Fed Funds Rate
  const t10  = macro.t10y;       // 10Y Treasury
  const eur  = macro.eurusd;     // EUR/USD

  let applied = 0;

  // ── rates — Tipos de interés ──────────────────────────────
  if (ff && ff.value !== null) {
    const rate     = ff.value;
    const trend    = ff.trend;
    const t10val   = t10 ? t10.value : null;
    let val = 'Fed Funds: ' + rate.toFixed(2) + '%';
    if (t10val) val += ' | T10Y: ' + t10val.toFixed(2) + '%';
    val += ' | Tendencia: ' + (trend==='up'?'↑ Subiendo':trend==='down'?'↓ Bajando':'→ Estable');

    // For stocks: high rates = headwind for growth; low = tailwind
    const rateMark = rate > 4.5 ? 'bad'    // high rates = pressure on multiples
                   : rate < 2.0 ? 'ok'     // low rates = cheap money
                   : 'watch';

    if (!state.inputs.rates) {
      state.inputs.rates = val;
      state.marks.rates  = rateMark;
      applied++;
    }
  }

  // ── inflation ─────────────────────────────────────────────
  // We use the Fed Funds trend as a proxy for inflation environment
  if (ff && ff.value !== null) {
    const rate  = ff.value;
    let inflVal = '';
    let inflMark = 'watch';

    if (rate > 4.0) {
      inflVal  = 'Entorno de tipos altos (' + rate.toFixed(2) + '%) — inflación elevada o reciente subida de tipos';
      inflMark = 'bad';
    } else if (rate > 2.0) {
      inflVal  = 'Tipos moderados (' + rate.toFixed(2) + '%) — inflación controlada';
      inflMark = 'watch';
    } else {
      inflVal  = 'Tipos bajos (' + rate.toFixed(2) + '%) — entorno expansivo para acciones';
      inflMark = 'ok';
    }

    if (!state.inputs.inflation) {
      state.inputs.inflation = inflVal;
      state.marks.inflation  = inflMark;
      applied++;
    }
  }

  // ── currency risk — Riesgo divisa ─────────────────────────
  if (state.ticker && _macroCache) {
    // Use ticker currency from Yahoo data if available
    const tickerCurrency = _afData ? _afData.currency : null;
    const eurRate = eur ? eur.value : null;

    let currVal  = '';
    let currMark = 'watch';

    if (tickerCurrency === 'USD') {
      currVal  = 'Empresa en USD — divisa de reserva global. Riesgo divisa mínimo para inversor en USD.';
      currMark = 'ok';
    } else if (tickerCurrency === 'EUR') {
      currVal  = 'Empresa en EUR' + (eurRate ? ' | EUR/USD: ' + eurRate.toFixed(4) : '');
      currMark = 'watch';
    } else if (tickerCurrency) {
      currVal  = 'Divisa: ' + tickerCurrency + (eurRate ? ' | EUR/USD ref: ' + eurRate.toFixed(4) : '');
      currMark = 'watch';
    } else {
      currVal  = eurRate ? 'EUR/USD: ' + eurRate.toFixed(4) : 'Ver exposición geográfica en informe anual';
    }

    if (!state.inputs.currency && currVal) {
      state.inputs.currency = currVal;
      state.marks.currency  = currMark;
      applied++;
    }
  }

  // ── sector_risk — Riesgo sectorial ────────────────────────
  // Use Yahoo recommendation mean + analyst consensus
  if (_afData && !state.inputs.sector_risk) {
    const rec = _afData.recommendMean;   // 1=Strong Buy, 5=Sell
    const nAnalysts = _afData.numberOfAnalysts;
    if (rec !== null) {
      const recLabel = rec <= 1.5 ? 'Compra Fuerte'
                     : rec <= 2.5 ? 'Compra'
                     : rec <= 3.5 ? 'Neutral'
                     : rec <= 4.5 ? 'Venta'
                     : 'Venta Fuerte';
      const recMark  = rec <= 2.0 ? 'ok' : rec >= 4.0 ? 'bad' : 'watch';
      const val = 'Consenso analistas: ' + recLabel
        + (nAnalysts ? ' (' + nAnalysts + ' analistas)' : '')
        + ' | Score: ' + rec.toFixed(1) + '/5';
      state.inputs.sector_risk = val;
      state.marks.sector_risk  = recMark;
      applied++;
    }
  }

  if (applied > 0) {
    renderGrid();
    _saveState();
  }
}

// AI QUALITATIVE FILL — moat, management, governance, regulatory
// Called after _afApply when Worker is available

async function _afFillQualitative() {
  if (!WORKER_URL || !_afData || !state.ticker) return;

  // Only fill items that are still empty
  const needsFill = ['moat','management','governance','regulatory']
    .filter(id => !state.inputs[id] || !state.marks[id]);
  if (!needsFill.length) return;

  const d = _afData;
  const sector = state.sector || 'technology';
  const pLang = lang==='en'?'English':lang==='pt'?'Português':'Español';

  const prompt = `Eres un analista financiero experto en análisis cualitativo.
Analiza "${state.name||state.ticker}" (${sector}) con estos datos cuantitativos:
- P/E: ${d.pe?d.pe.toFixed(1):'N/A'}, ROE: ${d.roe?d.roe.toFixed(1)+'%':'N/A'}, Márgenes bruto/neto: ${d.grossMargin?d.grossMargin.toFixed(1)+'%':'N/A'}/${d.netMargin?d.netMargin.toFixed(1)+'%':'N/A'}
- D/E: ${d.debtToEquity?(d.debtToEquity/100).toFixed(1)+'x':'N/A'}, FCF Yield: ${d.fcfYield?d.fcfYield.toFixed(1)+'%':'N/A'}
- Insiders: ${d.heldByInsiders?d.heldByInsiders.toFixed(1)+'%':'N/A'}, Institucional: ${d.heldByInstitutions?d.heldByInstitutions.toFixed(0)+'%':'N/A'}
- Short float: ${d.shortPercent?d.shortPercent.toFixed(1)+'%':'N/A'}, Beta: ${d.beta?d.beta.toFixed(2):'N/A'}
- Consenso analistas: ${d.recommendMean?d.recommendMean.toFixed(1)+'/5':'N/A'} (${d.numberOfAnalysts||'?'} analistas)
- Cambio acciones: ${d.sharesChange?(d.sharesChange>0?'+':'')+d.sharesChange.toFixed(1)+'%/año':'N/A'}
- Rev growth: ${d.revenueGrowth?d.revenueGrowth.toFixed(1)+'%':'N/A'}, EPS growth: ${d.earningsGrowth?d.earningsGrowth.toFixed(1)+'%':'N/A'}

Evalúa estos 4 factores cualitativos INFERIDOS de los datos cuantitativos (no son datos exactos — son estimaciones).
Responde SOLO en ${pLang} con este JSON (sin markdown):
{
  "moat": {"value": "descripción breve de la ventaja competitiva inferida de los márgenes y crecimiento", "mark": "ok|watch|bad"},
  "management": {"value": "evaluación del management inferida de insiders, recompras, ROE y guidance implícito", "mark": "ok|watch|bad"},
  "governance": {"value": "evaluación de gobernanza inferida de estructura accionarial, remuneración implícita y dilución", "mark": "ok|watch|bad"},
  "regulatory": {"value": "evaluación del entorno regulatorio para el sector ${sector} en el contexto actual", "mark": "ok|watch|bad"}
}`;

  try {
    const res = await fetch(WORKER_URL + '/ai', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({prompt, lang})
    });
    if (!res.ok) return;
    const json = await res.json();
    if (!json.ok || !json.analysis) return;

    const a = json.analysis;
    let filled = 0;
    ['moat','management','governance','regulatory'].forEach(id => {
      if (a[id] && a[id].value && !state.inputs[id]) {
        // Prefix with AI indicator
        state.inputs[id] = '🤖 ' + a[id].value;
        state.marks[id]  = a[id].mark || 'watch';
        filled++;
      }
    });

    if (filled > 0) {
      renderGrid();
      _saveState();
      // Show toast
      const msg = {
        es: `🤖 ${filled} ítems cualitativos estimados por IA`,
        en: `🤖 ${filled} qualitative items estimated by AI`,
        pt: `🤖 ${filled} itens qualitativos estimados por IA`,
      }[lang] || `🤖 ${filled} items estimated`;
      _showToast(msg, 4000);
    }
  } catch(e) {
    console.warn('[AXIOS-IQ] Qualitative AI fill failed:', e.message);
  }
}

    {id:'beginner', lbl:spt('filterBeg')},
    {id:'intermediate', lbl:spt('filterMid')},
    {id:'advanced', lbl:spt('filterAdv')},
  ];

  html += '<div class="sp-filters">';
  catFilters.forEach(function(f){
    html += '<button class="sp-filter'+(_spCatFilter===f.id?' active':'')
      +'" onclick="spSetCatFilter(\''+f.id+'\')">'+f.lbl+'</button>';
  });
  html += '<div class="sp-filter-sep"></div>';
  levelFilters.forEach(function(f){
    html += '<button class="sp-filter'+(_spLevelFilter===f.id?' active':'')
      +'" onclick="spSetLevelFilter(\''+f.id+'\')">'+f.lbl+'</button>';
  });
  html += '</div>';

  // Filter items
  var filtered = items.filter(function(a){
    if (_spCatFilter !== 'all' && a.cat !== _spCatFilter) return false;
    if (_spLevelFilter !== 'all' && a.level !== _spLevelFilter) return false;
    if (_spQuery) {
      var q = _spQuery.toLowerCase();
      var title = (l==='en'?a.title.en:(l==='pt'?a.title.pt:a.title.es)||'').toLowerCase();
      var body  = (l==='en'?a.body.en:(l==='pt'?a.body.pt:a.body.es)||'').toLowerCase();
      if (!title.includes(q) && !body.includes(q)) return false;
    }
    return true;
  });

  // Level class map
  var LVL_CLASS = { beginner:'level-start', intermediate:'level-mid', advanced:'level-adv' };
  var LVL_LABEL = { beginner:spt('levelBeg'), intermediate:spt('levelMid'), advanced:spt('levelAdv') };

  // Build cards
  if (!filtered.length) {
    html += '<div class="sp-empty"><div class="sp-empty-icon">🔍</div>'
      +'<div class="sp-empty-title">Sin resultados</div>'
      +'<div class="sp-empty-desc">Prueba con otros filtros o palabras clave.</div></div>';
  } else {
    html += '<div class="sp-grid">';
    filtered.forEach(function(a) {
      var title = (l==='en'?a.title.en:(l==='pt'?a.title.pt:a.title.es)) || '';
      var desc  = '';
      var rawBody = l==='en'?a.body.en:(l==='pt'?a.body.pt:a.body.es);
      if (rawBody) {
        var tmp = document.createElement('div');
        tmp.innerHTML = rawBody;
        desc = tmp.textContent.trim().slice(0,160);
      }
      var lvlClass = LVL_CLASS[a.level] || 'level-start';
      var lvlLabel = LVL_LABEL[a.level] || '';
      var catIcons = {fundamental:'📊', technical:'📐', macro:'🌍', quality:'🏛️'};
      var icon = catIcons[a.cat] || '📚';

      html += '<div class="sp-card" onclick="spOpenArticle(\''+a.id+'\')">'
        + '<div class="sp-card-top">'
        + '<span class="sp-card-icon">'+icon+'</span>'
        + '<span class="sp-card-level '+lvlClass+'">'+lvlLabel+'</span>'
        + '</div>'
        + '<div class="sp-card-cat">'+a.cat+'</div>'
        + '<div class="sp-card-title">'+title+'</div>'
        + '<div class="sp-card-desc">'+desc+'</div>'
        + '<div class="sp-card-foot">'
        + '<span class="sp-card-read">'+spt('readMore')+'</span>'
        + '<span class="sp-card-arr">→</span>'
        + '</div></div>';
    });
    html += '</div>';
  }

  el.innerHTML = html;

  // Wire search
  var searchEl = document.getElementById('sp-search-input');
  if (searchEl) {
    searchEl.addEventListener('input', function(){
      _spQuery = this.value;
      requestAnimationFrame(_spBuildArticlesUI);
    });
    searchEl.focus();
  }
}

function spSetCatFilter(f)   { _spCatFilter   = f; _spBuildArticlesUI(); }
function spSetLevelFilter(f) { _spLevelFilter  = f; _spBuildArticlesUI(); }

// ── Article modal ─────────────────────────────────────────────
function spOpenArticle(id) {
  if (!spAcademiaData) return;
  var a = spAcademiaData.find(function(x){ return x.id===id; });
  if (!a) return;
  var l = spLang;
  var title = l==='en'?a.title.en:(l==='pt'?a.title.pt:a.title.es)||'';
  var body  = l==='en'?a.body.en:(l==='pt'?a.body.pt:a.body.es)||'';
  var link  = a.link||'';
  var linkLbl = a.link_label||'Ver fuente';

  document.getElementById('sp-modal-cat').textContent   = a.cat + (a.level?' · '+a.level:'');
  document.getElementById('sp-modal-title').textContent = title;
  document.getElementById('sp-modal-body').innerHTML    = body
    + (link ? '<br><a class="sp-source" href="'+link+'" target="_blank" rel="noopener">🔗 '+linkLbl+'</a>' : '');
  document.getElementById('sp-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function spCloseModal() {
  document.getElementById('sp-modal').classList.remove('open');
  document.body.style.overflow = '';
}

// ══════════════════════════════════════════════════════════════
// COURSES VIEW
// ══════════════════════════════════════════════════════════════
function spRenderCourses() {
  if (typeof _spRenderCoursesTab === 'function') { _spRenderCoursesTab(); return; }
  spLoadCourses(function() { _spBuildCoursesUI(); });
}

function _spBuildCoursesUI() {
  var el = document.getElementById('sp-courses-content');
  if (!el) return;

  if (!spCourses || !spCourses.length) {
    el.innerHTML = '<div class="sp-empty"><div class="sp-empty-icon">📦</div>'
      +'<div class="sp-empty-title">courses.json no encontrado</div>'
      +'<div class="sp-empty-desc">Añade un archivo courses.json en la misma carpeta.</div></div>';
    return;
  }

  var l = spLang;

  var html = '<div class="sp-courses-grid">';
  spCourses.forEach(function(course) {
    var stats  = spGetCourseStats(course.id);
    var locked = !spIsCourseUnlocked(course);
    var pct    = stats.pct || 0;
    var title  = l==='en'?course.title.en:(l==='pt'?course.title.pt:course.title.es)||course.title.es||'';
    var desc   = l==='en'?course.desc.en:(l==='pt'?course.desc.pt:course.desc.es)||course.desc.es||'';
    var lessonsCount = course.lessons ? course.lessons.length : 0;

    html += '<div class="sp-course-card'+(locked?' sp-course-locked':'')+'" '
      +'onclick="'+(locked?'spShowToast(spt(\'lockMsg\'),2500)':'spOpenCourse(\''+course.id+'\')')+'"">'
      +'<div class="sp-course-hero" style="background:'+course.bgColor+'">'
      +(locked?'<span style="font-size:40px">🔒</span>':'<span class="sp-course-icon">'+course.icon+'</span>')
      +'</div>'
      +'<div class="sp-course-body">'
      +'<div class="sp-course-title">'+title+'</div>'
      +'<div class="sp-course-desc">'+desc+'</div>'
      +'<div class="sp-course-meta">'
      +'<span class="sp-course-lessons">'+lessonsCount+' '+spt('lessons')+'</span>'
      +'<div class="sp-course-progress">'
      +'<div class="sp-prog-bar"><div class="sp-prog-fill" style="width:'+pct+'%"></div></div>'
      +'<span class="sp-prog-pct">'+pct+'%</span>'
      +'</div></div>'
      +'</div></div>';
  });

  html += '</div>';
  el.innerHTML = html;
}

// ── Course viewer ─────────────────────────────────────────────
function spOpenCourse(courseId) {
  if (!spCourses) return;
  var course = spCourses.find(function(c){ return c.id===courseId; });
  if (!course) return;
  spCurrentCourse = course;

  var l = spLang;
  var title = l==='en'?course.title.en:(l==='pt'?course.title.pt:course.title.es)||'';
  var stats = spGetCourseStats(courseId);

  document.getElementById('sp-cv-title').textContent = title;
  document.getElementById('sp-cv-prog-fill').style.width = stats.pct + '%';

  var lessonsHtml = '';
  (course.lessons||[]).forEach(function(lesson, i) {
    var done  = spIsLessonDone(courseId, lesson.id);
    var ltitle = l==='en'?lesson.title.en:(l==='pt'?lesson.title.pt:lesson.title.es)||lesson.title.es||'';
    lessonsHtml += '<div class="sp-lesson-item'+(done?' done':'')+'" onclick="spOpenLesson(\''+courseId+'\',\''+lesson.id+'\')">'
      +'<span class="sp-lesson-num">'+(i+1).toString().padStart(2,'0')+'</span>'
      +'<span class="sp-lesson-title">'+ltitle+'</span>'
      +(done?'<span class="sp-lesson-done">✓</span>':'')
      +'</div>';
  });

  document.getElementById('sp-cv-lessons').innerHTML = lessonsHtml || '<div style="color:var(--tx3);padding:20px">Sin lecciones configuradas.</div>';
  document.getElementById('sp-cv-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function spCloseCourse() {
  document.getElementById('sp-cv-overlay').classList.remove('open');
  document.body.style.overflow = '';
  _spBuildCoursesUI();
}

// ── Lesson reader ─────────────────────────────────────────────
function spOpenLesson(courseId, lessonId) {
  if (!spCourses) return;
  var course = spCourses.find(function(c){ return c.id===courseId; });
  if (!course) return;
  var lesson = (course.lessons||[]).find(function(l){ return l.id===lessonId; });
  if (!lesson) return;
  spCurrentCourse  = course;
  spCurrentLesson  = lesson;

  var l = spLang;
  var body = l==='en'?lesson.body.en:(l==='pt'?lesson.body.pt:lesson.body.es)||lesson.body.es||'';
  var done = spIsLessonDone(courseId, lessonId);

  document.getElementById('sp-lr-content').innerHTML = body;

  var doneBtn = document.getElementById('sp-lr-done-btn');
  if (doneBtn) {
    doneBtn.textContent = done ? '✓ '+spt('markDone') : spt('markDone');
    doneBtn.style.opacity = done ? '.5' : '1';
  }

  document.getElementById('sp-lr-overlay').classList.add('open');
  document.getElementById('sp-cv-overlay').classList.remove('open');

  // Read progress
  var contentEl = document.getElementById('sp-lr-overlay');
  contentEl.scrollTop = 0;
  contentEl.onscroll = function() {
    var prog = document.getElementById('sp-read-prog');
    if (!prog) return;
    var scrolled = contentEl.scrollTop;
    var total    = contentEl.scrollHeight - contentEl.clientHeight;
    if (total > 0) prog.style.width = Math.min(100, (scrolled/total)*100) + '%';
  };
}
function spCloseLesson() {
  document.getElementById('sp-lr-overlay').classList.remove('open');
  document.getElementById('sp-cv-overlay').classList.add('open');
}

function spMarkLessonDone() {
  if (!spCurrentCourse || !spCurrentLesson) return;
  spSaveLessonDone(spCurrentCourse.id, spCurrentLesson.id);
  var doneBtn = document.getElementById('sp-lr-done-btn');
  if (doneBtn) { doneBtn.textContent = '✓ '+spt('markDone'); doneBtn.style.opacity = '.5'; }

  if (spIsCourseComplete(spCurrentCourse.id)) {
    setTimeout(function(){ spShowCertificate(spCurrentCourse); }, 500);
  }
}

// ── Certificate ───────────────────────────────────────────────
function spShowCertificate(course) {
  var l = spLang;
  var courseTitle = l==='en'?course.title.en:(l==='pt'?course.title.pt:course.title.es)||'';
  var canvas  = document.getElementById('sp-cert-canvas');
  var ctx     = canvas.getContext('2d');
  canvas.width = 960; canvas.height = 640;

  // Background
  ctx.fillStyle = '#070a0e';
  ctx.fillRect(0, 0, 960, 640);

  // Gold border
  ctx.strokeStyle = '#f59e0b';
  ctx.lineWidth   = 6;
  ctx.strokeRect(20, 20, 920, 600);
  ctx.strokeStyle = 'rgba(245,158,11,.3)';
  ctx.lineWidth   = 1;
  ctx.strokeRect(30, 30, 900, 580);

  // Icon
  ctx.font = '72px serif';
  ctx.textAlign = 'center';
  ctx.fillText('💡', 480, 120);

  // Title
  ctx.fillStyle = '#f59e0b';
  ctx.font = 'bold 44px sans-serif';
  ctx.fillText(spt('certTitle'), 480, 200);

  // Course
  ctx.fillStyle = '#e2e8f0';
  ctx.font = '28px sans-serif';
  ctx.fillText(courseTitle, 480, 270);

  // Date
  ctx.fillStyle = '#94a3b8';
  ctx.font = '18px monospace';
  ctx.fillText(new Date().toLocaleDateString(l==='en'?'en-US':'es-ES', {year:'numeric',month:'long',day:'numeric'}), 480, 340);

  ctx.fillStyle = 'rgba(245,158,11,.2)';
  ctx.font = '14px monospace';
  ctx.fillText('SOPHIA·IQ · Academia de Inversión', 480, 590);

  document.getElementById('sp-cert-overlay').classList.add('open');
}
function spCloseCert() { document.getElementById('sp-cert-overlay').classList.remove('open'); }
function spDownloadCert() {
  var canvas = document.getElementById('sp-cert-canvas');
  var a = document.createElement('a');
  a.download = 'sophiaiq-certificado.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

// ── Progress (localStorage) ───────────────────────────────────
function spGetProgress()                    { try{ return JSON.parse(localStorage.getItem('sq_prog')||'{}'); }catch(e){ return {}; } }
function spSaveLessonDone(cId, lId)         { var p=spGetProgress(); if(!p[cId])p[cId]={}; p[cId][lId]=1; localStorage.setItem('sq_prog',JSON.stringify(p)); }
function spIsLessonDone(cId, lId)           { var p=spGetProgress(); return !!(p[cId]&&p[cId][lId]); }
function spIsCourseComplete(cId) {
  if (!spCourses) return false;
  var c = spCourses.find(function(x){ return x.id===cId; });
  if (!c || !c.lessons) return false;
  return c.lessons.every(function(l){ return spIsLessonDone(cId, l.id); });
}
function spIsCourseUnlocked(course) {
  if (!course.requires) return true;
  return spIsCourseComplete(course.requires);
}
function spGetCourseStats(cId) {
  if (!spCourses) return {done:0,total:0,pct:0};
  var c = spCourses.find(function(x){ return x.id===cId; });
  if (!c||!c.lessons) return {done:0,total:0,pct:0};
  var total = c.lessons.length;
  var done  = c.lessons.filter(function(l){ return spIsLessonDone(cId,l.id); }).length;
  return {done:done, total:total, pct:total?Math.round((done/total)*100):0};
}

    if (document.getElementById('sp-lr-overlay').classList.contains('open')) spCloseLesson();
    else if (document.getElementById('sp-cv-overlay').classList.contains('open')) spCloseCourse();
    else if (document.getElementById('sp-modal').classList.contains('open')) spCloseModal();

});
